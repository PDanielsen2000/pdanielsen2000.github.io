<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --stone: #1a1612; --stone2: #242018; --stone3: #2e2a24;
    --gold: #c9a84c; --gold2: #e8c97a;
    --mist: #8a9aaa; --fog: #b0bec8; --text: #f0ece4;
    --whisky: #a0522d; --whisky2: #cd853f;
  }
  body { background: var(--stone); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .tartan-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, #4a6741 40px, #4a6741 44px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, #4a6741 40px, #4a6741 44px),
      repeating-linear-gradient(0deg, transparent, transparent 20px, #1a3a6a 20px, #1a3a6a 22px),
      repeating-linear-gradient(90deg, transparent, transparent 20px, #1a3a6a 20px, #1a3a6a 22px);
  }

  header { position: relative; z-index: 1; overflow: hidden; }
  .hero { background: linear-gradient(180deg, #0a0e14 0%, #1a1a2e 40%, #2a1a0e 100%); padding: 30px 20px 0; text-align: center; position: relative; }
  .skyline { width: 100%; max-width: 600px; margin: 0 auto; display: block; opacity: 0.6; filter: drop-shadow(0 0 20px rgba(201,168,76,0.3)); }
  .hero-text { position: relative; padding: 16px 20px 28px; background: linear-gradient(180deg, transparent, rgba(10,14,20,0.95)); margin-top: -60px; }
  .hero-flag { font-size: 2rem; margin-bottom: 6px; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: var(--gold2); text-shadow: 0 0 40px rgba(201,168,76,0.5); letter-spacing: 2px; line-height: 1.1; margin-bottom: 5px; }
  .hero-sub { color: var(--mist); font-size: 0.82rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; }
  .mist-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  #signin-screen { position: relative; z-index: 1; max-width: 420px; margin: 40px auto; padding: 0 20px; animation: fadeUp .6s ease; }
  .signin-card { background: var(--stone2); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; padding: 36px 28px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1); }
  .whisky-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; filter: drop-shadow(0 0 10px rgba(201,168,76,0.4)); }
  .signin-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold2); margin-bottom: 6px; }
  .signin-sub { color: var(--mist); font-size: 0.83rem; margin-bottom: 24px; line-height: 1.5; }
  .input-wrap { margin-bottom: 14px; }
  .input-wrap input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1.5px solid rgba(201,168,76,0.25); background: rgba(255,255,255,0.05); color: var(--text); font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s, box-shadow .2s; }
  .input-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  .input-wrap input::placeholder { color: #5a5550; }
  .btn-primary { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(135deg, var(--gold), var(--whisky2)); border: none; color: #1a1200; font-size: 1rem; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all .2s; box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }

  #players-bar { display: none; position: relative; z-index: 1; flex-wrap: wrap; gap: 7px; justify-content: center; padding: 10px 16px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(201,168,76,0.15); }
  .player-chip { padding: 4px 12px; border-radius: 20px; font-size: 0.76rem; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); color: var(--fog); display: flex; align-items: center; gap: 5px; }
  .player-chip.me { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  #app { display: none; }
  .tab-bar { position: relative; z-index: 1; display: flex; gap: 6px; padding: 12px 16px; background: var(--stone2); border-bottom: 1px solid rgba(201,168,76,0.1); align-items: center; flex-wrap: wrap; }
  .tab-btn { padding: 8px 18px; border-radius: 25px; font-size: 0.82rem; cursor: pointer; border: 1px solid rgba(201,168,76,0.2); background: transparent; color: var(--mist); font-family: 'Inter', sans-serif; transition: all .2s; }
  .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--whisky2)); border-color: transparent; color: #1a1200; font-weight: 700; }
  .refresh-btn { padding: 7px 14px; border-radius: 25px; font-size: 0.78rem; cursor: pointer; border: 1px solid rgba(138,154,170,0.3); background: transparent; color: var(--mist); font-family: 'Inter', sans-serif; }
  .reset-btn { padding: 7px 14px; border-radius: 25px; font-size: 0.78rem; cursor: pointer; border: 1px solid rgba(180,60,60,0.3); background: transparent; color: #e06060; font-family: 'Inter', sans-serif; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .app-wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 14px 80px; }
  .whisky-deco { text-align: center; padding: 8px; font-size: 1.3rem; opacity: 0.25; letter-spacing: 8px; margin-bottom: 10px; }
  .tip { background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; padding: 9px 14px; font-size: 0.78rem; color: var(--mist); margin-bottom: 18px; }

  .slot-section { margin-bottom: 26px; animation: fadeUp .4s ease; }
  .slot-header { display: flex; align-items: center; gap: 12px; padding: 13px 18px; border-radius: 14px 14px 0 0; border-left: 3px solid var(--gold); background: linear-gradient(90deg, rgba(201,168,76,0.08), transparent); border-top: 1px solid rgba(201,168,76,0.15); border-right: 1px solid rgba(201,168,76,0.1); border-bottom: none; }
  .slot-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--gold2); }
  .slot-time { font-size: 0.72rem; color: var(--mist); margin-left: auto; letter-spacing: 1px; }
  .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; padding: 10px; background: var(--stone2); border: 1px solid rgba(201,168,76,0.1); border-top: none; border-radius: 0 0 14px 14px; }

  /* OPTION CARD */
  .option-card { background: var(--stone3); border: 1.5px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: all .2s; position: relative; }
  .option-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-1px); }
  .option-card.voted { border-color: var(--gold); background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(46,42,36,0.9)); box-shadow: 0 0 20px rgba(201,168,76,0.15); }
  .option-card.pause { border-style: dashed; border-color: rgba(138,154,170,0.25); }
  .option-card.pause.voted { border-color: #52b788; background: linear-gradient(135deg, rgba(82,183,136,0.1), rgba(46,42,36,0.9)); }

  .option-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
  .option-label { font-size: 0.88rem; font-weight: 600; color: var(--fog); flex: 1; line-height: 1.3; }
  .option-card.voted .option-label { color: var(--gold2); }
  .option-check { font-size: 0.9rem; flex-shrink: 0; margin-left: 4px; }
  .option-price { font-size: 0.69rem; color: #6a7a8a; margin-bottom: 5px; }

  /* RATING */
  .option-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
  .stars { color: var(--gold); font-size: 0.7rem; letter-spacing: 1px; }
  .rating-score { font-size: 0.69rem; color: var(--mist); }

  /* INFO TOGGLE */
  .info-btn { font-size: 0.68rem; color: rgba(201,168,76,0.6); background: none; border: none; cursor: pointer; padding: 0; font-family: 'Inter', sans-serif; text-decoration: underline; text-underline-offset: 2px; display: block; margin-bottom: 6px; }
  .info-btn:hover { color: var(--gold); }
  .info-panel { display: none; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 9px 10px; margin-bottom: 7px; border: 1px solid rgba(201,168,76,0.1); }
  .info-panel.open { display: block; animation: fadeUp .2s ease; }
  .info-desc { font-size: 0.72rem; color: var(--mist); line-height: 1.5; margin-bottom: 6px; }
  .info-review { font-size: 0.68rem; color: #6a7a8a; font-style: italic; line-height: 1.4; margin-bottom: 6px; border-left: 2px solid rgba(201,168,76,0.2); padding-left: 6px; }
  .info-link { display: inline-block; font-size: 0.68rem; color: var(--gold); text-decoration: none; border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; padding: 3px 8px; transition: all .15s; }
  .info-link:hover { background: rgba(201,168,76,0.1); }

  /* VOTE BAR */
  .vote-bar-meta { display: flex; justify-content: space-between; font-size: 0.67rem; color: #5a6a7a; margin-bottom: 3px; }
  .vote-bar-bg { background: rgba(255,255,255,0.06); border-radius: 4px; height: 3px; overflow: hidden; }
  .vote-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--gold), var(--whisky2)); transition: width .5s ease; }
  .option-card.pause .vote-bar-fill { background: #52b788; }
  .voter-avatars { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
  .voter-avatar { font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.15); color: var(--mist); }
  .voter-avatar.is-me { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold2); }

  /* RESULTS */
  .results-panel { background: var(--stone2); border: 1px solid rgba(201,168,76,0.15); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .results-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold2); margin-bottom: 14px; }
  .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(0,0,0,0.2); border-radius: 9px; margin-bottom: 6px; border-left: 2px solid var(--gold); }
  .result-slot { font-size: 0.71rem; color: var(--mist); width: 150px; flex-shrink: 0; }
  .result-winner { font-size: 0.87rem; font-weight: 600; color: var(--text); flex: 1; }
  .result-votes { font-size: 0.74rem; color: var(--gold); }
  .result-tie { color: var(--whisky2); font-size: 0.74rem; }
  .detail-slot-title { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--gold2); margin-bottom: 7px; padding-left: 10px; border-left: 2px solid var(--gold); font-size: 0.9rem; }
  .detail-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; margin-bottom: 4px; border: 1px solid rgba(201,168,76,0.08); }
  .detail-row.win { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.25); }

  #poll-indicator { position: fixed; bottom: 16px; right: 16px; font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); pointer-events: none; backdrop-filter: blur(10px); z-index: 999; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="tartan-bg"></div>

<header>

</header>

<div id="signin-screen">
  <div class="signin-card">
    <span class="whisky-icon">🥃</span>
    <div class="signin-title">Hvem er du?</div>
    <p class="signin-sub">Skriv dit navn og deltag i afstemningen om dagens program</p>

      <input type="text" id="name-input" placeholder="Dit navn..." maxlength="24" autocomplete="off">
    </div>
    <button class="btn-primary" onclick="signIn()">Gå med i gruppen →</button>
  </div>
</div>

<div id="players-bar"></div>

<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('vote',this)">🗳️ Stem</button>
    <button class="tab-btn" onclick="switchTab('results',this)">📊 Resultater</button>
    <button class="refresh-btn" onclick="manualRefresh()">🔄 Opdatér</button>
    <button class="reset-btn" onclick="resetAll()">🗑️ Nulstil</button>
  </div>
  <div id="tab-vote" class="tab-content active">
    <div class="app-wrap">
      <div class="whisky-deco">🥃 ⚔️ 🏰 ⚔️ 🥃</div>

      <div id="slots-container"></div>
    </div>
  </div>
  <div id="tab-results" class="tab-content">
    <div class="app-wrap">
      <div class="results-panel">
        <h2>📋 Dagens vindere</h2>
        <div id="results-list"></div>
      </div>
      <div id="results-detail"></div>
    </div>
  </div>
</div>

<div id="poll-indicator">● Live</div>

let state = { players:[], votes:{} };
let ME = null;
let pollTimer = null;

async function loadState() {
  try {
    const r = await fetch(FB_URL);
    const data = await r.json();
    if (!data || typeof data !== "object") return { players:[], votes:{} };
    if (!data.players) data.players = [];
    if (!data.votes)   data.votes   = {};
    return data;
  } catch { return { players:[], votes:{} }; }
}

async function saveState(s) {
  try {
    await fetch(FB_URL, {
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(s)
    });
  } catch {}
}

document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") signIn();
});

async function signIn() {
  const val = (document.getElementById("name-input").value || "").trim();
  if (!val) { document.getElementById("name-input").style.borderColor = "#e06060"; return; }
  ME = val;
  try {
    state = await loadState();
    if (!state.players.includes(ME)) state.players.push(ME);
    if (!state.votes[ME]) state.votes[ME] = {};
    await saveState(state);
    document.getElementById("signin-screen").style.display = "none";
    document.getElementById("players-bar").style.display   = "flex";
    document.getElementById("app").style.display           = "block";
    render();
    startPolling();
  } catch(e) { alert("Fejl: " + e.message); }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const fresh = await loadState();
    if (JSON.stringify(fresh) !== JSON.stringify(state)) {
      state = fresh; render(); flash("🔄 Ny stemme!");
    }
  }, 3000);
}

function flash(msg) {
  const el = document.getElementById("poll-indicator");
  el.textContent = msg;
  setTimeout(() => { el.textContent = "● Live"; }, 2000);
}

async function manualRefresh() {
  state = await loadState(); render(); flash("✅ Opdateret!");
}

async function vote(slotId, optId) {
  state = await loadState();
  if (!state.votes[ME]) state.votes[ME] = {};
  if (state.votes[ME][slotId] === optId) delete state.votes[ME][slotId];
  else state.votes[ME][slotId] = optId;
  await saveState(state);
  render();
}

async function resetAll() {
  if (!confirm("⚠️ Er du sikker? Dette sletter ALLE stemmer og spillere!")) return;
  const empty = { players:[], votes:{} };
  await saveState(empty);
  state = empty; ME = null;
  document.getElementById("signin-screen").style.display = "block";
  document.getElementById("players-bar").style.display   = "none";
  document.getElementById("app").style.display           = "none";
  document.getElementById("name-input").value = "";
  if (pollTimer) clearInterval(pollTimer);
}

function toggleInfo(id) {
  const panel = document.getElementById("info-" + id);
  const btn   = document.getElementById("btn-" + id);
  if (!panel) return;
  const open = panel.classList.toggle("open");
  btn.textContent = open ? "▲ Skjul info" : "ℹ️ Info & anmeldelse";
}

function tally(slotId) {
  const out = {};
  for (const [name, picks] of Object.entries(state.votes || {})) {
    const p = picks[slotId];
    if (p) { out[p] = out[p] || []; out[p].push(name); }
  }
  return out;
}

function totalVoters(slotId) {
  return Object.values(state.votes || {}).filter(v => v[slotId]).length;
}

function winner(slotId) {
  const t = tally(slotId);
  if (!Object.keys(t).length) return null;
  let best = null, bestN = 0, tie = false;
  for (const [id, voters] of Object.entries(t)) {
    if (voters.length > bestN) { best = id; bestN = voters.length; tie = false; }
    else if (voters.length === bestN) tie = true;
  }
  return { id:best, count:bestN, tie };
}

function render() { renderPlayers(); renderSlots(); renderResults(); }

function renderPlayers() {
  document.getElementById("players-bar").innerHTML =
    (state.players || []).map(p =>
      `<div class="player-chip ${p===ME?"me":""}">
        <div class="dot"></div>${p}${p===ME?" (dig)":""}
      </div>`
    ).join("");
}

function renderSlots() {
  const c = document.getElementById("slots-container");
  if (!c) return;
  c.innerHTML = "";
  SLOTS.forEach(slot => {
    const t     = tally(slot.id);
    const total = totalVoters(slot.id);
    const myVote = state.votes[ME]?.[slot.id] || null;

    const cards = OPTIONS[slot.id].map(opt => {
      const voters  = t[opt.id] || [];
      const pct     = total > 0 ? Math.round(voters.length / total * 100) : 0;
      const voted   = myVote === opt.id;
      const cardId  = slot.id + "_" + opt.id;
      const avatars = voters.map(v =>
        `<span class="voter-avatar ${v===ME?"is-me":""}">${v}</span>`
      ).join("");

      const infoSection = !opt.isPause ? `
        <button class="info-btn" id="btn-${cardId}"
          onclick="event.stopPropagation(); toggleInfo('${cardId}')">
          ℹ️ Info & anmeldelse
        </button>
        <div class="info-panel" id="info-${cardId}">
          <div class="info-desc">${opt.about}</div>
          ${opt.review ? `<div class="info-review">${opt.review}</div>` : ""}
          ${opt.url ? `<a class="info-link" href="${opt.url}" target="_blank" onclick="event.stopPropagation()">🌐 Hjemmeside →</a>` : ""}
        </div>` : "";

      return `
        <div class="option-card ${voted?"voted":""} ${opt.isPause?"pause":""}"
             onclick="vote('${slot.id}','${opt.id}')">
          <div class="option-top">
            <div class="option-label">${opt.label}</div>
            ${voted?`<span class="option-check">✅</span>`:""}
          </div>
          <div class="option-price">${opt.desc}</div>
          ${opt.rating ? `
            <div class="option-rating">
              <span class="stars">${opt.stars}</span>
              <span class="rating-score">${opt.rating} / 5</span>
            </div>` : ""}
          ${infoSection}
          <div class="vote-bar-meta">
            <span>${voters.length} stemme${voters.length!==1?"r":""}</span>
            <span>${pct}%</span>
          </div>
          <div class="vote-bar-bg">
            <div class="vote-bar-fill" style="width:${pct}%"></div>
          </div>
          ${voters.length>0?`<div class="voter-avatars">${avatars}</div>`:""}
        </div>`;
    }).join("");

    const sec = document.createElement("div");
    sec.className = "slot-section";
    sec.innerHTML = `
      <div class="slot-header">
        <span class="slot-title">${slot.label}</span>
        <span class="slot-time">${slot.time}</span>
      </div>
      <div class="options-grid">${cards}</div>`;
    c.appendChild(sec);
  });
}

function renderResults() {
  const list   = document.getElementById("results-list");
  const detail = document.getElementById("results-detail");
  if (!list || !detail) return;

  list.innerHTML = SLOTS.map(slot => {
    const w     = winner(slot.id);
    const total = totalVoters(slot.id);
    const opt   = w ? OPTIONS[slot.id].find(o => o.id === w.id) : null;
    return `
      <div class="result-row">
        <div class="result-slot">${slot.label}</div>
        <div class="result-winner">
          ${w
            ? `👑 ${opt?opt.label:w.id} ${w.tie?'<span class="result-tie">(uafgjort)</span>':""}`
            : `<span style="color:#5a6a7a">Ingen stemmer endnu</span>`}
        </div>
        ${w?`<div class="result-votes">${w.count}/${total}</div>`:""}
      </div>`;
  }).join("");

  detail.innerHTML = SLOTS.map(slot => {
    const t     = tally(slot.id);
    const total = totalVoters(slot.id);
    const maxV  = Math.max(0, ...Object.values(t).map(v => v.length));
    return `
      <div style="margin-bottom:18px">
        <div class="detail-slot-title">${slot.label}</div>
        ${OPTIONS[slot.id].map(opt => {
          const voters = t[opt.id] || [];
          const pct    = total>0 ? Math.round(voters.length/total*100) : 0;
          const isWin  = voters.length>0 && voters.length===maxV;
          return `
            <div class="detail-row ${isWin?"win":""}">
              <span style="flex:1;font-size:0.83rem;color:${isWin?"var(--gold2)":"#6a7a8a"}">${isWin?"👑 ":""}${opt.label}</span>
              <div style="width:70px;background:rgba(255,255,255,0.05);border-radius:3px;height:3px;overflow:hidden">
                <div style="height:100%;background:${opt.isPause?"#52b788":"linear-gradient(90deg,var(--gold),var(--whisky2))"};width:${pct}%"></div>
              </div>
              <span style="font-size:0.71rem;color:var(--gold);width:46px;text-align:right">${voters.length}·${pct}%</span>
            </div>`;
        }).join("")}
      </div>`;
  }).join("");
}

function switchTab(id, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+id).classList.add("active");
}
