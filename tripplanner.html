<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edinburgh Dagsplan – Stem!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e8e8f0;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    padding: 32px 20px 24px;
    text-align: center;
    border-bottom: 2px solid #4a90d9;
  }
  header .flag { font-size: 2.4rem; }
  header h1 { font-size: 1.9rem; color: #fff; margin: 6px 0 4px; letter-spacing: 1px; }
  header p  { color: #90b4d8; font-size: 0.9rem; }

  /* ── SIGN-IN ── */
  #signin-screen {
    max-width: 420px;
    margin: 60px auto;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 16px;
    padding: 36px 28px;
    text-align: center;
  }
  #signin-screen h2 { font-size: 1.4rem; margin-bottom: 8px; }
  #signin-screen p  { color: #8090b0; font-size: 0.88rem; margin-bottom: 24px; }
  #signin-screen input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 1.5px solid #3a3a6a; background: #12122a;
    color: #fff; font-size: 1rem; margin-bottom: 14px; outline: none;
  }
  #signin-screen input:focus { border-color: #4a90d9; }
  #signin-screen button {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #4a90d9; border: none; color: #fff;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  #signin-screen button:hover { background: #357abd; }

  /* ── PLAYERS BAR ── */
  #players-bar {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    padding: 12px 16px; background: #12122a; border-bottom: 1px solid #2a2a4a;
  }
  .player-chip {
    background: #1e1e3a; border: 1.5px solid #3a3a6a;
    border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; color: #c0cce0;
    display: flex; align-items: center; gap: 6px;
  }
  .player-chip.me { border-color: #4a90d9; color: #fff; background: #0f3460; }
  .player-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a90d9; }

  /* ── MAIN LAYOUT ── */
  #app { display: none; max-width: 900px; margin: 0 auto; padding: 20px 14px 60px; }

  /* ── SLOT SECTION ── */
  .slot-section { margin-bottom: 32px; }
  .slot-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px 12px 0 0;
    border-left: 4px solid var(--c);
    background: #1a1a2e; border-top: 1px solid #2a2a4a;
    border-right: 1px solid #2a2a4a;
  }
  .slot-title { font-size: 1.05rem; font-weight: 700; color: var(--c); }
  .slot-time  { font-size: 0.78rem; color: #607090; margin-left: auto; }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    padding: 12px;
    background: #14142a;
    border: 1px solid #2a2a4a;
    border-top: none;
    border-radius: 0 0 12px 12px;
  }

  .option-card {
    background: #1e1e38;
    border: 2px solid #2a2a4a;
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }
  .option-card:hover { border-color: #4a6090; transform: translateY(-1px); }
  .option-card.voted { border-color: var(--c); background: #0f1f3a; }
  .option-card.pause { border-style: dashed; }
  .option-card.pause.voted { background: #1a2a1a; border-color: #52b788; }

  .option-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .option-label { font-size: 0.92rem; font-weight: 600; color: #dde4f0; line-height: 1.3; }
  .option-desc  { font-size: 0.75rem; color: #7090b0; margin-bottom: 8px; }

  .vote-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 8px; font-size: 0.78rem; font-weight: 700;
    border: none; cursor: pointer; transition: all 0.15s;
    background: #2a3a5a; color: #90b4d8;
  }
  .vote-btn:hover { background: #3a4a6a; }
  .option-card.voted .vote-btn { background: var(--c); color: #fff; }
  .option-card.pause.voted .vote-btn { background: #52b788; color: #fff; }

  /* ── VOTE BAR ── */
  .vote-bar-wrap { margin-top: 8px; }
  .vote-bar-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: #5070a0; margin-bottom: 3px; }
  .vote-bar-bg { background: #2a2a4a; border-radius: 4px; height: 6px; overflow: hidden; }
  .vote-bar-fill { height: 100%; border-radius: 4px; background: var(--c); transition: width 0.4s ease; }
  .option-card.pause .vote-bar-fill { background: #52b788; }

  /* ── VOTER AVATARS ── */
  .voter-avatars { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .voter-avatar {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 10px;
    background: #1a2a3a; border: 1px solid #3a4a6a; color: #8090b0;
  }
  .voter-avatar.is-me { background: #0f2a4a; border-color: #4a90d9; color: #90c0f0; }

  /* ── RESULTS PANEL ── */
  #results-panel {
    background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 14px;
    padding: 20px; margin-bottom: 28px;
  }
  #results-panel h2 { font-size: 1.1rem; color: #4a90d9; margin-bottom: 16px; }
  .result-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: #12122a; border-radius: 8px;
    margin-bottom: 8px; border-left: 3px solid var(--c);
  }
  .result-slot { font-size: 0.75rem; color: #607090; width: 140px; flex-shrink: 0; }
  .result-winner { font-size: 0.9rem; font-weight: 700; color: #fff; flex: 1; }
  .result-votes { font-size: 0.78rem; color: #4a90d9; }
  .result-tie { color: #ffb347; font-size: 0.78rem; }

  /* ── NAV TABS ── */
  .tab-bar {
    display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
    border: 1.5px solid #2a2a4a; background: #1a1a2e; color: #8090b0;
    transition: all 0.15s;
  }
  .tab-btn.active { background: #4a90d9; border-color: #4a90d9; color: #fff; font-weight: 700; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── MISC ── */
  .tip { background: #0f2a40; border: 1px solid #4a90d9; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #90c0e0; margin-bottom: 20px; }
  .winner-crown { font-size: 1.1rem; }
</style>
</head>
<body>

<header>
  <div class="flag">🏴󠁧󠁢󠁳󠁣󠁴󠁧</div>
  <h1>Edinburgh Dagsplan</h1>
  <p>Stem på dagens program – alle i gruppen bestemmer!</p>
</header>

<!-- SIGN IN -->
<div id="signin-screen">
  <h2>👋 Hvem er du?</h2>
  <p>Skriv dit navn for at deltage i afstemningen</p>
  <input type="text" id="name-input" placeholder="Dit navn..." maxlength="24" autocomplete="off">
  <button onclick="signIn()">Gå med i gruppen →</button>
</div>

<!-- PLAYERS BAR (hidden until signed in) -->
<div id="players-bar" style="display:none"></div>

<!-- MAIN APP -->
<div id="app">

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('vote',this)">🗳️ Stem</button>
    <button class="tab-btn" onclick="switchTab('results',this)">📊 Resultater</button>
  </div>

  <!-- VOTE TAB -->
  <div id="tab-vote" class="tab-content active">
    <div class="tip">💡 Vælg én mulighed per slot. Du kan skifte din stemme når som helst. Resultater opdateres live!</div>
    <div id="slots-container"></div>
  </div>

  <!-- RESULTS TAB -->
  <div id="tab-results" class="tab-content">
    <div id="results-panel">
      <h2>📋 Dagens vindere</h2>
      <div id="results-list"></div>
    </div>
    <div id="slots-container-results"></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const SLOTS = [
  { id:"morning",   label:"🌅 Formiddagsaktivitet", time:"09:00 – 12:00", color:"#f4a261" },
  { id:"lunch",     label:"🍽️ Frokost",             time:"12:00 – 13:30", color:"#52b788" },
  { id:"afternoon", label:"☀️ Eftermiddagsaktivitet",time:"13:30 – 17:00", color:"#4a90d9" },
  { id:"dinner",    label:"🍷 Aftenspisning",        time:"17:00 – 20:00", color:"#e76f51" },
  { id:"night",     label:"🌙 Nataktivitet",         time:"20:00 – ?",     color:"#c77dff" },
];

const OPTIONS = {
  morning: [
    { id:"castle",   label:"🏰 Edinburgh Castle",        desc:"Ca. £20 · ~170 kr." },
    { id:"holyrood", label:"👑 Palace of Holyroodhouse",  desc:"Ca. £18 · ~157 kr." },
    { id:"arthurs",  label:"🌋 Arthur's Seat – vandring", desc:"Gratis 🆓" },
    { id:"museum",   label:"🏛️ National Museum",          desc:"Gratis 🆓" },
    { id:"camera",   label:"🌀 Camera Obscura",           desc:"Ca. £25 · ~217 kr." },
    { id:"pause_m",  label:"😴 Pause / Frileg",           desc:"Sov længe – hyg jer!", isPause:true },
  ],
  lunch: [
    { id:"oink",       label:"🐷 Oink Pulled Pork",        desc:"Ca. £7 · ~61 kr." },
    { id:"makars",     label:"🥔 Makars Mash Bar",          desc:"Ca. £15 · ~130 kr." },
    { id:"streetfood", label:"🌮 Edinburgh Street Food",    desc:"Ca. £10 · ~87 kr." },
    { id:"worldsend",  label:"🍺 The World's End Pub",      desc:"Ca. £15 · ~130 kr." },
    { id:"larder",     label:"☕ Edinburgh Larder (brunch)", desc:"Ca. £12 · ~104 kr." },
    { id:"pause_l",    label:"🧃 Pause / Frileg",           desc:"Picnic i parken!", isPause:true },
  ],
  afternoon: [
    { id:"royalmile", label:"🪨 Gåtur – Royal Mile & Closes", desc:"Gratis 🆓" },
    { id:"whisky",    label:"🥃 Scotch Whisky Experience",    desc:"£21–45 · ~183–391 kr." },
    { id:"dungeon",   label:"💀 Edinburgh Dungeon",           desc:"Ca. £22 · ~191 kr." },
    { id:"boom",      label:"🪓 Boom Battle Bar",             desc:"Ca. £15 · ~130 kr." },
    { id:"dynamic",   label:"🌍 Dynamic Earth",               desc:"Ca. £20 · ~174 kr." },
    { id:"calton",    label:"🏔️ Calton Hill – udsigt",        desc:"Gratis 🆓" },
    { id:"pause_a",   label:"☕ Pause / Frileg",              desc:"Kaffe og shopping!", isPause:true },
  ],
  dinner: [
    { id:"kitchin",  label:"⭐ The Kitchin (Michelin)",  desc:"Ca. £100 · ~870 kr." },
    { id:"dome",     label:"🍾 The Dome",                desc:"Ca. £45 · ~391 kr." },
    { id:"devils",   label:"⚖️ The Devil's Advocate",    desc:"Ca. £35 · ~305 kr." },
    { id:"makars2",  label:"🥔 Makars Mash Bar",         desc:"Ca. £18 · ~157 kr." },
    { id:"pepes",    label:"🍗 Pepe's Kylling",          desc:"Ca. £10 · ~87 kr." },
    { id:"pause_d",  label:"🛁 Pause / Frileg",          desc:"Tag tilbage på hotellet!", isPause:true },
  ],
  night: [
    { id:"stramash",    label:"🎸 Stramash – Livmusik",       desc:"Gratis entre de fleste aftener" },
    { id:"voodoo",      label:"🪩 The Voodoo Rooms",          desc:"Ingen fast entre" },
    { id:"caves",       label:"🕯️ The Caves – Natklub",       desc:"Fra ca. £5 · ~44 kr." },
    { id:"labelle",     label:"🎭 La Belle Angele",           desc:"Ca. £10 · ~87 kr." },
    { id:"pubcrawl",    label:"🍻 On The Rocks Pubcrawl",     desc:"Ca. £18 · ~157 kr." },
    { id:"vaccines",    label:"🎸 The Vaccines (4. marts)",   desc:"Ca. £40 · ~348 kr." },
    { id:"pause_n",     label:"🛌 Pause / Tidlig aften",      desc:"Tidlig sengetid – ingen skam!", isPause:true },
  ],
};

// ─────────────────────────────────────────────
// STATE  (in-memory; swap saveState/loadState for localStorage in production)
// ─────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem("edinburgh_vote_v1");
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem("edinburgh_vote_v1", JSON.stringify(s)); } catch {}
}

let state = loadState();
if (!state.players) state.players = [];
if (!state.votes)   state.votes   = {};

let ME = null; // current user's name

// ─────────────────────────────────────────────
// SIGN IN
// ─────────────────────────────────────────────
document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") signIn();
});

function signIn() {
  const input = document.getElementById("name-input");
  const val = (input.value || "").trim();
  if (!val) {
    input.style.borderColor = "#e76f51";
    input.placeholder = "Skriv dit navn først!";
    return;
  }
  input.style.borderColor = "";
  ME = val;

  if (!state.players.includes(ME)) state.players.push(ME);
  if (!state.votes[ME]) state.votes[ME] = {};
  saveState(state);

  document.getElementById("signin-screen").style.display = "none";
  document.getElementById("players-bar").style.display  = "flex";
  document.getElementById("app").style.display          = "block";

  render();
}

// ─────────────────────────────────────────────
// VOTE
// ─────────────────────────────────────────────
function vote(slotId, optId) {
  if (!ME) return;
  if (state.votes[ME][slotId] === optId) {
    delete state.votes[ME][slotId]; // toggle off
  } else {
    state.votes[ME][slotId] = optId;
  }
  saveState(state);
  render();
}

// ─────────────────────────────────────────────
// TALLY
// ─────────────────────────────────────────────
function tally(slotId) {
  // returns { optId: [voterName, ...], ... }
  const counts = {};
  for (const [name, picks] of Object.entries(state.votes)) {
    const pick = picks[slotId];
    if (pick) {
      if (!counts[pick]) counts[pick] = [];
      counts[pick].push(name);
    }
  }
  return counts;
}

function totalVoters(slotId) {
  return Object.values(state.votes).filter(v => v[slotId]).length;
}

function winner(slotId) {
  const t = tally(slotId);
  if (!Object.keys(t).length) return null;
  let best = null, bestN = 0, tie = false;
  for (const [oid, voters] of Object.entries(t)) {
    if (voters.length > bestN) { best = oid; bestN = voters.length; tie = false; }
    else if (voters.length === bestN) { tie = true; }
  }
  return { optId: best, count: bestN, tie };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  renderPlayersBar();
  renderSlots("slots-container", false);
  renderSlots("slots-container-results", true);
  renderResults();
}

function renderPlayersBar() {
  const bar = document.getElementById("players-bar");
  bar.innerHTML = state.players.map(p =>
    `<div class="player-chip ${p===ME?'me':''}">
      <div class="dot"></div>${p}${p===ME?' (dig)':''}
    </div>`
  ).join("");
}

function renderSlots(containerId, readonly) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = "";

  SLOTS.forEach(slot => {
    const t = tally(slot.id);
    const total = totalVoters(slot.id);
    const myVote = ME ? (state.votes[ME]?.[slot.id] || null) : null;

    const section = document.createElement("div");
    section.className = "slot-section";

    const opts = OPTIONS[slot.id].map(opt => {
      const voters = t[opt.id] || [];
      const pct = total > 0 ? Math.round((voters.length / total) * 100) : 0;
      const isVoted = myVote === opt.id;

      const avatars = voters.map(v =>
        `<span class="voter-avatar ${v===ME?'is-me':''}">${v}</span>`
      ).join("");

      return `
        <div class="option-card ${isVoted?'voted':''} ${opt.isPause?'pause':''}"
             style="--c:${slot.color}"
             ${!readonly ? `onclick="vote('${slot.id}','${opt.id}')"` : ''}>
          <div class="option-top">
            <div class="option-label">${opt.label}</div>
            ${isVoted ? `<span style="font-size:1rem">✅</span>` : ''}
          </div>
          <div class="option-desc">${opt.desc}</div>
          ${!readonly ? `
            <button class="vote-btn" style="--c:${slot.color}">
              ${isVoted ? '✅ Din stemme' : '🗳️ Stem'}
            </button>
          ` : ''}
          <div class="vote-bar-wrap">
            <div class="vote-bar-meta">
              <span>${voters.length} stemme${voters.length!==1?'r':''}</span>
              <span>${pct}%</span>
            </div>
            <div class="vote-bar-bg">
              <div class="vote-bar-fill" style="--c:${slot.color}; width:${pct}%"></div>
            </div>
            ${voters.length > 0 ? `<div class="voter-avatars">${avatars}</div>` : ''}
          </div>
        </div>`;
    }).join("");

    section.innerHTML = `
      <div class="slot-header" style="--c:${slot.color}">
        <span class="slot-title">${slot.label}</span>
        <span class="slot-time">${slot.time}</span>
      </div>
      <div class="options-grid">${opts}</div>`;

    c.appendChild(section);
  });
}

function renderResults() {
  const list = document.getElementById("results-list");
  if (!list) return;

  list.innerHTML = SLOTS.map(slot => {
    const w = winner(slot.id);
    const total = totalVoters(slot.id);

    if (!w) {
      return `<div class="result-row" style="--c:${slot.color}">
        <div class="result-slot">${slot.label}</div>
        <div class="result-winner" style="color:#607090">Ingen stemmer endnu</div>
      </div>`;
    }

    const opt = OPTIONS[slot.id].find(o => o.id === w.optId);
    return `<div class="result-row" style="--c:${slot.color}">
      <div class="result-slot">${slot.label}</div>
      <div class="result-winner">
        <span class="winner-crown">👑</span> ${opt ? opt.label : w.optId}
        ${w.tie ? `<span class="result-tie"> · Uafgjort!</span>` : ''}
      </div>
      <div class="result-votes">${w.count} / ${total} stemmer</div>
    </div>`;
  }).join("");
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-" + id).classList.add("active");
  if (id === "results") render();
}

// ─────────────────────────────────────────────
// LIVE SYNC  (poll localStorage every 3s so other tabs/users on same device stay in sync)
// For a real multi-device setup, replace with a small backend or Firebase.
// ─────────────────────────────────────────────
setInterval(() => {
  const fresh = loadState();
  const changed = JSON.stringify(fresh) !== JSON.stringify(state);
  if (changed) {
    state = fresh;
    if (ME) render();
  }
}, 3000);
</script>
</body>
</html>
