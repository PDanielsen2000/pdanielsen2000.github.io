<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>US Privacy Compliance Check – Cookiebot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f4f5f7;color:#1a1a2e;-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}

.nav{background:#1b2a4a;height:52px;display:flex;align-items:center;padding:0 24px;gap:8px;position:sticky;top:0;z-index:20}
.nav-icon{width:24px;height:24px;border-radius:5px;background:#1a73e8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px}
.nav-brand{color:#fff;font-weight:700;font-size:14px}
.nav-sep{width:1px;height:24px;background:#2d3f5e;margin:0 12px}
.nav-domain{color:#94a3b8;font-size:12px;font-family:monospace}
.nav-right{margin-left:auto;display:flex;gap:4px}
.np{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.np.off{border:2px solid #2d3f5e;color:#475569;background:transparent}
.np.on{border:2px solid #1a73e8;color:#fff;background:#1a73e8}
.np.ok{border:2px solid #22c55e;color:#fff;background:#22c55e}

.wrap{max-width:720px;margin:0 auto;padding:32px 20px 60px}

/* INTRO */
.intro-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);padding:48px 40px;text-align:center}
.intro-card h1{font-size:28px;font-weight:800;margin-bottom:8px}
.intro-card .sub{font-size:14px;color:#6b7280;margin-bottom:28px;max-width:420px;margin-left:auto;margin-right:auto}
.url-wrap{display:flex;gap:0;max-width:480px;margin:0 auto 24px}
.url-in{flex:1;padding:14px 18px;border:2px solid #e4e7ec;border-radius:10px 0 0 10px;font-size:15px;outline:none;color:#1a1a2e}
.url-in:focus{border-color:#1a73e8}
.url-in::placeholder{color:#c4c9d2}
.url-btn{padding:14px 28px;background:#1a73e8;color:#fff;border:none;border-radius:0 10px 10px 0;font-size:15px;font-weight:700;cursor:pointer}
.url-btn:hover{background:#1557b0}
.checks{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.chk-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#4b5563}
.chk-item .cd{width:7px;height:7px;border-radius:50%;background:#1a73e8}

/* CARD */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden}
.card-header{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #ebedf0}
.card-step{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.card-step.active{background:#1a73e8;color:#fff}
.card-step.done{background:#22c55e;color:#fff}
.card-title{font-size:16px;font-weight:700}
.card-subtitle{font-size:12px;color:#6b7280}
.card-body{padding:20px 24px}
.card-body p{font-size:13px;color:#4b5563;margin-bottom:12px}

/* SCAN ANIM */
.scan-anim{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#f8f9fb;border-radius:8px;margin-bottom:16px}
.spinner{width:20px;height:20px;border:2.5px solid #e4e7ec;border-top-color:#1a73e8;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-text{font-size:13px;color:#4b5563}.scan-text strong{color:#1a1a2e}

/* CATEGORY GROUPS */
.cat-group{margin:16px 0}
.cat-head{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:2px solid #ebedf0;margin-bottom:8px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-dot.mkt{background:#ef4444}.cat-dot.stat{background:#f59e0b}.cat-dot.nec{background:#22c55e}.cat-dot.pref{background:#3b82f6}
.cat-name{font-size:13px;font-weight:700;color:#1a1a2e}
.cat-count{font-size:12px;font-weight:700;color:#6b7280}
.cat-note{font-size:10px;color:#6b7280;font-style:italic;margin-left:auto}

/* SERVICE ITEM */
.svc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:#f8f9fb;margin-bottom:4px;animation:fadeIn .3s;font-size:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.svc-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.svc-icon.mkt{background:#fee2e2;color:#dc2626}.svc-icon.stat{background:#fef3c7;color:#d97706}.svc-icon.nec{background:#d1fae5;color:#059669}.svc-icon.pref{background:#dbeafe;color:#2563eb}
.svc-name{font-weight:600;color:#1a1a2e;flex:1}
.svc-domain{font-size:10px;color:#1a73e8;font-family:monospace}
.svc-status{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
.svc-status.firing{background:#fef2f2;color:#dc2626}
.svc-status.stopped{background:#f0fdf4;color:#16a34a}
.svc-status.ok{background:#f0fdf4;color:#16a34a}
.st-dot{width:5px;height:5px;border-radius:50%}

/* NEC DIMMING — necessary services appear lighter/muted */
.cat-group.nec-group .svc-item{background:#fafbfc;opacity:.7}
.cat-group.nec-group .svc-name{color:#6b7280}

/* VERDICT */
.verdict{display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:8px;margin:12px 0}
.verdict.pass{background:#f0fdf4;border:1px solid #bbf7d0}
.verdict.fail{background:#fef2f2;border:1px solid #fecaca}
.verdict.info{background:#eff6ff;border:1px solid #bfdbfe}
.v-icon{width:24px;height:24px;flex-shrink:0}
.v-text{flex:1}
.v-title{font-size:13px;font-weight:700}
.verdict.pass .v-title{color:#166534}.verdict.fail .v-title{color:#991b1b}.verdict.info .v-title{color:#1e40af}
.v-detail{font-size:12px;margin-top:2px}
.verdict.pass .v-detail{color:#15803d}.verdict.fail .v-detail{color:#b91c1c}.verdict.info .v-detail{color:#1d4ed8}

/* COUNTERS */
.counters{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
.counter{padding:10px 16px;border-radius:8px;text-align:center;flex:1;min-width:90px}
.counter .c-num{font-size:24px;font-weight:800}
.counter .c-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.counter.red{background:#fef2f2;border:1px solid #fecaca}.counter.red .c-num{color:#dc2626}.counter.red .c-lbl{color:#991b1b}
.counter.green{background:#f0fdf4;border:1px solid #bbf7d0}.counter.green .c-num{color:#16a34a}.counter.green .c-lbl{color:#166534}
.counter.gray{background:#f8f9fb;border:1px solid #e4e7ec}.counter.gray .c-num{color:#1a1a2e}.counter.gray .c-lbl{color:#6b7280}

/* COMPARISON TABLE */
.cmp-wrap{border:1px solid #e4e7ec;border-radius:8px;overflow:hidden;overflow-x:auto;margin:12px 0}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{padding:8px 12px;text-align:left;font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;font-weight:600;background:#fafbfc;border-bottom:2px solid #ebedf0}
.cmp-table td{padding:8px 12px;border-bottom:1px solid #f3f4f6}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table tr.nec-row{opacity:.6}
.cmp-cat-header td{background:#f8f9fb;font-weight:700;font-size:11px;padding:6px 12px;color:#4b5563}

/* RISK */
.risk-lg{display:inline-flex;align-items:center;gap:10px;border-radius:24px;padding:12px 28px;font-weight:700;font-size:18px;margin:12px 0}
.risk-lg.high{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.risk-lg.medium{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.risk-lg.low{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}

/* CTA */
.cta-box{background:linear-gradient(135deg,#1b2a4a 0%,#1a73e8 100%);border-radius:12px;padding:28px 24px;text-align:center;margin-top:20px}
.cta-box h3{color:#fff;font-size:18px;font-weight:800;margin-bottom:4px}
.cta-box p{color:#bfdbfe;font-size:13px;margin-bottom:18px}
.cta-box .btn{background:#fff;color:#1b2a4a;padding:12px 32px;font-size:14px}

/* BTN */
.btn{padding:10px 22px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#1a73e8;color:#fff}.btn-p:hover{background:#1557b0}
.btn-s{background:#f4f5f7;color:#4b5563;border:1px solid #e4e7ec}.btn-s:hover{background:#ebedf0}
.btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-icon">C</div>
  <span class="nav-brand">Cookiebot™</span>
  <div class="nav-sep"></div>
  <span class="nav-domain" id="nav-domain">US Privacy Compliance Check</span>
  <div class="nav-right" id="nav-pills"></div>
</div>

<div class="wrap"><div id="content"></div></div>

<script>
var PROXY='';

var KS={'google-analytics.com':{n:'Google Analytics',c:'stat'},'googletagmanager.com':{n:'Google Tag Manager',c:'stat'},'analytics.google.com':{n:'Google Analytics',c:'stat'},'doubleclick.net':{n:'DoubleClick',c:'mkt'},'googlesyndication.com':{n:'Google Ads',c:'mkt'},'googleadservices.com':{n:'Google Ads',c:'mkt'},'adservice.google.com':{n:'Google Ads',c:'mkt'},'facebook.net':{n:'Meta / Facebook',c:'mkt'},'facebook.com':{n:'Meta / Facebook',c:'mkt'},'fbcdn.net':{n:'Meta CDN',c:'mkt'},'linkedin.com':{n:'LinkedIn',c:'mkt'},'ads.linkedin.com':{n:'LinkedIn Ads',c:'mkt'},'tiktok.com':{n:'TikTok',c:'mkt'},'twitter.com':{n:'X / Twitter',c:'mkt'},'t.co':{n:'X / Twitter',c:'mkt'},'bing.com':{n:'Microsoft Bing',c:'mkt'},'bat.bing.com':{n:'Bing Ads',c:'mkt'},'clarity.ms':{n:'Microsoft Clarity',c:'stat'},'hotjar.com':{n:'Hotjar',c:'stat'},'hubspot.com':{n:'HubSpot',c:'mkt'},'pinterest.com':{n:'Pinterest',c:'mkt'},'reddit.com':{n:'Reddit',c:'mkt'},'snapchat.com':{n:'Snapchat',c:'mkt'},'criteo.com':{n:'Criteo',c:'mkt'},'criteo.net':{n:'Criteo',c:'mkt'},'taboola.com':{n:'Taboola',c:'mkt'},'outbrain.com':{n:'Outbrain',c:'mkt'},'amplitude.com':{n:'Amplitude',c:'stat'},'segment.com':{n:'Segment',c:'stat'},'mixpanel.com':{n:'Mixpanel',c:'stat'},'fullstory.com':{n:'FullStory',c:'stat'},'youtube.com':{n:'YouTube',c:'mkt'},'vimeo.com':{n:'Vimeo',c:'stat'},'stripe.com':{n:'Stripe',c:'nec'},'cookiebot.com':{n:'Cookiebot',c:'nec'},'usercentrics.eu':{n:'Usercentrics',c:'nec'},'onetrust.com':{n:'OneTrust',c:'nec'},'cookielaw.org':{n:'OneTrust',c:'nec'},'newrelic.com':{n:'New Relic',c:'nec'},'nr-data.net':{n:'New Relic',c:'nec'},'sentry.io':{n:'Sentry',c:'nec'},'cloudflare.com':{n:'Cloudflare',c:'nec'},'cloudflareinsights.com':{n:'Cloudflare',c:'nec'},'intercom.io':{n:'Intercom',c:'pref'},'zendesk.com':{n:'Zendesk',c:'pref'},'drift.com':{n:'Drift',c:'pref'}};

var catMeta={
  mkt:{name:'Marketing',dot:'mkt',color:'#ef4444',note:'Must stop when GPC opt-out is active'},
  stat:{name:'Statistics',dot:'stat',color:'#f59e0b',note:'Should stop when GPC opt-out is active'},
  pref:{name:'Preferences',dot:'pref',color:'#3b82f6',note:'May continue based on configuration'},
  nec:{name:'Necessary',dot:'nec',color:'#22c55e',note:'Always allowed to fire — essential for site function'}
};
var catOrder=['mkt','stat','pref','nec'];

var S={domain:'',url:'',step:0,normalSvcs:[],gpcSvcs:[],dnsFound:false,gpcDeclared:false,gpcWellKnown:null,gpcSupported:false};

// ═══ SIMULATE ═══
function simulateScan(domain,isGpc,cb){
  var pool=[
    {n:'Google Analytics',c:'stat',d:'google-analytics.com',h:false},
    {n:'Google Tag Manager',c:'stat',d:'googletagmanager.com',h:false},
    {n:'Google Ads',c:'mkt',d:'googleadservices.com',h:false},
    {n:'DoubleClick',c:'mkt',d:'doubleclick.net',h:false},
    {n:'Meta / Facebook',c:'mkt',d:'facebook.net',h:true},
    {n:'LinkedIn Ads',c:'mkt',d:'ads.linkedin.com',h:true},
    {n:'Hotjar',c:'stat',d:'hotjar.com',h:true},
    {n:'HubSpot',c:'mkt',d:'hubspot.com',h:false},
    {n:'Criteo',c:'mkt',d:'criteo.com',h:true},
    {n:'Cloudflare',c:'nec',d:'cloudflare.com',h:false},
    {n:'Stripe',c:'nec',d:'stripe.com',h:false},
    {n:'New Relic',c:'nec',d:'newrelic.com',h:false},
    {n:'Intercom',c:'pref',d:'intercom.io',h:true},
    {n:'Zendesk',c:'pref',d:'zendesk.com',h:false},
  ];
  var count=7+Math.floor(Math.random()*5);
  var shuffled=pool.sort(function(){return .5-Math.random()});
  var selected=shuffled.slice(0,count);
  if(isGpc) selected=selected.filter(function(s){return !s.h||s.c==='nec'});

  var i=0,results=[];
  function next(){
    if(i>=selected.length){cb(results);return}
    results.push({name:selected[i].n,cat:selected[i].c,domain:selected[i].d});
    i++;
    setTimeout(next,250+Math.random()*400);
  }
  setTimeout(next,600);
}

function simulateGpcWellKnown(domain,cb){
  // In production: fetch https://domain/.well-known/gpc.json via proxy
  // Simulate: ~40% chance it exists
  setTimeout(function(){
    var found=Math.random()>0.6;
    cb(found?{gpc:true,lastUpdate:'2025-06-01'}:null);
  },800);
}

// ═══ RENDER HELPERS ═══
function svcItemHtml(s,statusHtml){
  var cls=s.cat;
  return '<div class="svc-item"><div class="svc-icon '+cls+'">'+s.name.charAt(0)+'</div><div style="flex:1"><div class="svc-name">'+s.name+'</div><div class="svc-domain">'+s.domain+'</div></div>'+(statusHtml||'')+'</div>';
}

function groupByCategory(svcs){
  var groups={};
  svcs.forEach(function(s){if(!groups[s.cat])groups[s.cat]=[];groups[s.cat].push(s)});
  return groups;
}

function renderGroupedFeed(containerId,svcs,showStatus,gpcSvcs){
  var el=document.getElementById(containerId);if(!el)return;
  var groups=groupByCategory(svcs);
  var html='';
  catOrder.forEach(function(cat){
    var list=groups[cat];if(!list||!list.length)return;
    var m=catMeta[cat];
    html+='<div class="cat-group'+(cat==='nec'?' nec-group':'')+'">';
    html+='<div class="cat-head"><span class="cat-dot '+m.dot+'"></span><span class="cat-name">'+m.name+'</span><span class="cat-count">'+list.length+'</span><span class="cat-note">'+m.note+'</span></div>';
    list.forEach(function(s){
      var st='';
      if(showStatus&&cat!=='nec'){
        var inGpc=gpcSvcs&&gpcSvcs.find(function(g){return g.name===s.name});
        if(inGpc) st='<span class="svc-status firing"><span class="st-dot" style="background:#ef4444"></span>Ignoring GPC</span>';
        else st='<span class="svc-status stopped"><span class="st-dot" style="background:#22c55e"></span>Honoring GPC</span>';
      }
      if(cat==='nec') st='<span class="svc-status ok"><span class="st-dot" style="background:#22c55e"></span>Essential</span>';
      html+=svcItemHtml(s,st);
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function verdictHtml(type,title,detail){
  var icons={
    pass:'<svg class="v-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#22c55e"/><path d="M7 12.5l3 3 5.5-5.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    fail:'<svg class="v-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#ef4444"/><path d="M8 8l8 8M16 8l-8 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>',
    info:'<svg class="v-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#3b82f6"/><rect x="11" y="7" width="2" height="6" rx="1" fill="#fff"/><rect x="11" y="15" width="2" height="2" rx="1" fill="#fff"/></svg>'
  };
  return '<div class="verdict '+type+'">'+icons[type]+'<div class="v-text"><div class="v-title">'+title+'</div><div class="v-detail">'+detail+'</div></div></div>';
}

// ═══ STEPS ═══
function updatePills(){
  var h='';
  for(var i=1;i<=3;i++){
    var cls=i<S.step?'ok':i===S.step?'on':'off';
    h+='<div class="np '+cls+'">'+(i<S.step?'✓':i)+'</div>';
  }
  document.getElementById('nav-pills').innerHTML=h;
}

function render(){
  var c=document.getElementById('content');
  if(S.step===0)renderIntro(c);
  else if(S.step===1)renderScan(c);
  else if(S.step===2)renderGpcScan(c);
  else if(S.step===3)renderResults(c);
  updatePills();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderIntro(c){
  document.getElementById('nav-domain').textContent='US Privacy Compliance Check';
  c.innerHTML='<div class="intro-card"><h1>Check your US privacy compliance</h1><p class="sub">We\'ll scan your website, detect third-party services, and test whether they respect the GPC opt-out signal.</p><div class="url-wrap"><input class="url-in" id="urlin" placeholder="https://www.yoursite.com" autofocus><button class="url-btn" onclick="startScan()">Scan</button></div><div class="checks"><div class="chk-item"><span class="cd"></span> Service detection</div><div class="chk-item"><span class="cd"></span> "Do Not Sell" link</div><div class="chk-item"><span class="cd"></span> GPC well-known</div><div class="chk-item"><span class="cd"></span> GPC honoring test</div></div></div>';
  setTimeout(function(){var inp=document.getElementById('urlin');if(inp){inp.focus();inp.addEventListener('keydown',function(e){if(e.key==='Enter')startScan()})}},50);
}

function renderScan(c){
  c.innerHTML=
    '<div class="card"><div class="card-header"><div class="card-step active">1</div><div><div class="card-title">Scanning your website</div><div class="card-subtitle">Detecting services, checking footer, and looking for GPC declaration</div></div></div><div class="card-body">'+
    '<div class="scan-anim" id="scan-anim"><div class="spinner"></div><div class="scan-text">Scanning <strong>'+S.domain+'</strong> as a California visitor…</div></div>'+
    '<div id="svc-feed"></div>'+
    '<div id="scan-verdicts"></div>'+
    '<div id="scan-next" class="hidden"></div>'+
    '</div></div>';

  // Run scans in parallel
  var scansDone=0;
  function checkDone(){
    scansDone++;
    if(scansDone<3)return;

    document.getElementById('scan-anim').innerHTML='<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#22c55e"/><path d="M6 10.5l2.5 2.5L14 8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="scan-text"><strong>Scan complete</strong> — '+S.normalSvcs.length+' services detected</div>';

    // Show verdicts
    var v='';

    // DNS
    v+=S.dnsFound
      ?verdictHtml('pass','"Do Not Sell or Share" link found','Detected in the website footer.')
      :verdictHtml('fail','No "Do Not Sell or Share" link found','Required under CCPA/CPRA for businesses that sell or share personal information.');

    // GPC well-known
    if(S.gpcWellKnown&&S.gpcWellKnown.gpc===true){
      S.gpcDeclared=true;
      v+=verdictHtml('pass','GPC support declared via /.well-known/gpc.json','The website has published a GPC support resource, indicating it acknowledges and intends to honor the Global Privacy Control signal.');
    } else {
      v+=verdictHtml('info','No GPC support resource found','No /.well-known/gpc.json file detected. Websites can publish this file to formally declare they support GPC. This is optional but recommended under the W3C GPC specification.');
    }

    document.getElementById('scan-verdicts').innerHTML=v;
    document.getElementById('scan-next').classList.remove('hidden');
    document.getElementById('scan-next').innerHTML='<div class="btn-row"><button class="btn btn-p" onclick="S.step=2;render()">Next: Test GPC Signal →</button></div>';
  }

  // 1. Service detection
  simulateScan(S.domain,false,function(results){
    S.normalSvcs=results;
    renderGroupedFeed('svc-feed',results,false);
    S.dnsFound=Math.random()>0.4;
    checkDone();
  });

  // 2. GPC well-known check
  simulateGpcWellKnown(S.domain,function(result){
    S.gpcWellKnown=result;
    checkDone();
  });

  // 3. Small delay for visual pacing
  setTimeout(checkDone,2000);
}

function renderGpcScan(c){
  c.innerHTML=
    '<div class="card" style="border:2px solid #bbf7d0"><div class="card-header" style="background:#f0fdf4"><div class="card-step active" style="background:#22c55e">2</div><div><div class="card-title">Testing GPC opt-out signal</div><div class="card-subtitle">Re-scanning with Global Privacy Control enabled — which services stop?</div></div></div><div class="card-body">'+
    '<div class="scan-anim" id="gpc-anim" style="background:#f0fdf4;border:1px solid #bbf7d0"><div class="spinner" style="border-top-color:#22c55e"></div><div class="scan-text">Re-scanning <strong>'+S.domain+'</strong> with GPC signal <span style="background:#22c55e;color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">Sec-GPC: 1</span></div></div>'+
    '<p style="font-size:12px;color:#6b7280">Marketing and statistics services should stop loading when the GPC opt-out signal is present. Necessary services are always allowed.</p>'+
    '<div id="gpc-feed"></div>'+
    '<div id="gpc-verdicts"></div>'+
    '<div id="gpc-next" class="hidden"></div>'+
    '</div></div>';

  simulateScan(S.domain,true,function(results){
    S.gpcSvcs=results;

    // Show grouped with status
    renderGroupedFeed('gpc-feed',S.normalSvcs,true,S.gpcSvcs);

    var stopped=S.normalSvcs.filter(function(n){return n.cat!=='nec'&&!results.find(function(g){return g.name===n.name})});
    var violators=S.normalSvcs.filter(function(n){return n.cat!=='nec'&&results.find(function(g){return g.name===n.name})});
    S.gpcSupported=stopped.length>0;

    document.getElementById('gpc-anim').innerHTML='<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#22c55e"/><path d="M6 10.5l2.5 2.5L14 8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="scan-text"><strong>GPC test complete</strong></div>';

    var v='<div class="counters"><div class="counter green"><div class="c-num">'+stopped.length+'</div><div class="c-lbl">Stopped</div></div><div class="counter red"><div class="c-num">'+violators.length+'</div><div class="c-lbl">Ignoring GPC</div></div></div>';

    if(stopped.length>0) v+=verdictHtml('pass','GPC signal is effective',''+stopped.length+' non-essential service'+(stopped.length!==1?'s':'')+' stopped loading: '+stopped.map(function(s){return s.name}).join(', '));
    if(violators.length>0) v+=verdictHtml('fail',violators.length+' service'+(violators.length!==1?'s':'')+' ignoring GPC',''+violators.map(function(s){return s.name}).join(', ')+' continued loading despite the GPC opt-out signal.');
    if(stopped.length===0&&violators.length===0) v+=verdictHtml('info','No non-essential services detected','Only necessary services were found, so GPC comparison is not applicable.');

    document.getElementById('gpc-verdicts').innerHTML=v;
    document.getElementById('gpc-next').classList.remove('hidden');
    document.getElementById('gpc-next').innerHTML='<div class="btn-row"><button class="btn btn-s" onclick="S.step=1;render()">← Back</button><button class="btn btn-p" onclick="S.step=3;render()">See Full Results →</button></div>';
  });
}

function renderResults(c){
  var allSvcs={};
  S.normalSvcs.forEach(function(s){allSvcs[s.name]={name:s.name,cat:s.cat,domain:s.domain,normal:true,gpc:false}});
  S.gpcSvcs.forEach(function(s){if(allSvcs[s.name])allSvcs[s.name].gpc=true;else allSvcs[s.name]={name:s.name,cat:s.cat,domain:s.domain,normal:false,gpc:true}});
  var svcList=Object.values(allSvcs).sort(function(a,b){var o={mkt:0,stat:1,pref:2,nec:3};return(o[a.cat]||4)-(o[b.cat]||4)});

  var violators=svcList.filter(function(s){return s.normal&&s.gpc&&s.cat!=='nec'});
  var honoring=svcList.filter(function(s){return s.normal&&!s.gpc&&s.cat!=='nec'});

  var fails=0;
  if(!S.dnsFound)fails++;
  if(violators.length>0)fails++;
  if(!S.gpcSupported&&!S.gpcDeclared)fails++;

  var rl,rc;
  if(fails>=2){rl='High risk';rc='high'}
  else if(fails>=1){rl='Medium risk';rc='medium'}
  else{rl='Low risk';rc='low'}

  var dots={high:'#ef4444',medium:'#f59e0b',low:'#22c55e'};
  var msgs={high:'You need to take action!',medium:'Some improvements needed.',low:'Your site appears compliant!'};

  // Table rows grouped by category
  var tableRows='';
  catOrder.forEach(function(cat){
    var catSvcs=svcList.filter(function(s){return s.cat===cat});
    if(!catSvcs.length)return;
    var m=catMeta[cat];
    tableRows+='<tr class="cmp-cat-header"><td colspan="5"><span class="cat-dot '+m.dot+'" style="display:inline-block;vertical-align:middle;margin-right:6px"></span>'+m.name+' <span style="font-weight:400;color:#9ca3af;margin-left:4px">'+m.note+'</span></td></tr>';
    catSvcs.forEach(function(s){
      var isNec=s.cat==='nec';
      var nS=s.normal?'<span class="svc-status firing"><span class="st-dot" style="background:#ef4444"></span>Active</span>':'<span class="svc-status" style="color:#9ca3af">—</span>';
      var gS=s.gpc?'<span class="svc-status firing"><span class="st-dot" style="background:#ef4444"></span>Active</span>':'<span class="svc-status stopped"><span class="st-dot" style="background:#22c55e"></span>Stopped</span>';
      var honor;
      if(isNec) honor='<span class="svc-status ok"><span class="st-dot" style="background:#22c55e"></span>Essential</span>';
      else if(s.normal&&!s.gpc) honor='<span class="svc-status stopped"><span class="st-dot" style="background:#22c55e"></span>Yes</span>';
      else if(s.normal&&s.gpc) honor='<span class="svc-status firing"><span class="st-dot" style="background:#ef4444"></span>No</span>';
      else honor='<span class="svc-status" style="color:#9ca3af">N/A</span>';
      tableRows+='<tr'+(isNec?' class="nec-row"':'')+'><td><strong>'+s.name+'</strong><br><span style="font-size:10px;color:#1a73e8;font-family:monospace">'+s.domain+'</span></td><td>'+nS+'</td><td>'+gS+'</td><td>'+honor+'</td></tr>';
    });
  });

  c.innerHTML=
    '<div class="card"><div class="card-header"><div class="card-step done">✓</div><div><div class="card-title">Compliance Results: '+S.domain+'</div></div></div><div class="card-body">'+
    '<div class="risk-lg '+rc+'"><span style="width:12px;height:12px;border-radius:50%;background:'+dots[rc]+'"></span>'+rl+'</div>'+
    '<p style="color:'+{high:'#dc2626',medium:'#d97706',low:'#16a34a'}[rc]+';font-weight:600;margin-top:0">'+msgs[rc]+'</p>'+

    '<div class="counters"><div class="counter gray"><div class="c-num">'+svcList.length+'</div><div class="c-lbl">Services</div></div><div class="counter red"><div class="c-num">'+violators.length+'</div><div class="c-lbl">Ignoring GPC</div></div><div class="counter green"><div class="c-num">'+honoring.length+'</div><div class="c-lbl">Honoring GPC</div></div></div>'+

    // Verdicts
    (S.dnsFound?verdictHtml('pass','"Do Not Sell" link: Found','Detected in the website footer.'):verdictHtml('fail','"Do Not Sell" link: Missing','Required under CCPA/CPRA.'))+

    (S.gpcDeclared
      ?verdictHtml('pass','GPC declared via /.well-known/gpc.json','The website formally declares GPC support per the W3C specification.')
      :verdictHtml('info','No GPC support resource (/.well-known/gpc.json)','Not required, but recommended to formally signal GPC support per the W3C spec.'))+

    (S.gpcSupported
      ?verdictHtml('pass','GPC signal: Effective','Non-essential services changed behavior when GPC was enabled.')
      :verdictHtml('fail','GPC signal: Not effective','No non-essential services changed behavior when GPC was enabled.'))+

    (violators.length===0
      ?verdictHtml('pass','All non-essential services honor GPC','No marketing or statistics services ignored the GPC signal.')
      :verdictHtml('fail',violators.length+' service'+(violators.length!==1?'s':'')+' ignoring GPC opt-out',violators.map(function(v){return v.name}).join(', ')+' continued tracking despite GPC.'))+

    '<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Service-Level Comparison: Normal vs GPC</div>'+
    '<div class="cmp-wrap"><table class="cmp-table"><thead><tr><th>Service</th><th>Normal</th><th>With GPC</th><th>Honors GPC?</th></tr></thead><tbody>'+tableRows+'</tbody></table></div></div>'+

    '<div class="cta-box"><h3>Fix this with Cookiebot CMP</h3><p>Automate CCPA/CPRA compliance — manage DNS links, GPC declarations, and third-party consent.</p><a href="https://admin.cookiebot.com/signup" target="_blank"><button class="btn">Start your 14-day free trial</button></a></div>'+
    '<div class="btn-row" style="justify-content:center;margin-top:8px"><button class="btn btn-s" onclick="S={domain:\'\',url:\'\',step:0,normalSvcs:[],gpcSvcs:[],dnsFound:false,gpcDeclared:false,gpcWellKnown:null,gpcSupported:false};render()">Start over</button></div>'+
    '</div></div>';
}

function startScan(){
  var v=document.getElementById('urlin').value.trim();
  if(!v)return;
  if(v.indexOf('http')!==0)v='https://'+v;
  S.domain=v.replace(/^https?:\/\//,'').replace(/\/+$/,'');
  S.url=v;S.step=1;
  document.getElementById('nav-domain').textContent=S.domain;
  render();
}

render();
</script>
</body>
</html>
